 <div class="container mt-5">
     <h1 class="text-center mb-4">Contacto</h1>
     <p class="text-center">
        Si tenés alguna consulta, completá el siguiente formulario y nos pondremos en contacto con vos.
     </p>
     <form>
         <div class="mb-3">
             <label for="nombre" class="form-label">Nombre</label>
             <input type="text" class="form-control" id="nombre" placeholder="Ingresá tu nombre">
         </div>
         <div class="mb-3">
             <label for="correo" class="form-label">Correo electrónico</label>
             <input type="email" class="form-control" id="correo" placeholder="ejemplo@gmail.com">
         </div>
         <div class="mb-3">
             <label for="mensaje" class="form-label">Mensaje</label>
             <textarea class="form-control" id="mensaje" rows="5" placeholder="Escribí tu mensaje"></textarea>
         </div>
         <button type="submit" class="btn btn-primary">
             Enviar
         </button>
     </form>
 </div>
